name: Bug Report
description: Report a bug or unexpected behavior in gis-engine
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
  - type: input
    id: package
    attributes:
      label: Affected Package
      description: Which package is affected?
      placeholder: "@gis-engine/engine"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      description: What version of the package are you using?
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you running?
      placeholder: "22.x"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior. Include code snippets if possible.
      placeholder: |
        1. Install @gis-engine/engine@1.0.0
        2. Create a MapSpec with...
        3. Call applyCommands with...
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or diagnostic output if available.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Additional environment details (OS, browser, MapLibre version, etc.)
      placeholder: |
        - OS: macOS 15 / Windows 11 / Ubuntu 24.04
        - Browser (if applicable): Chrome 125
        - MapLibre GL JS: 6.x
