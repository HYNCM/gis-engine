# Agent Daily Cadence — daily quality/docs evidence

name: Agent Daily Cadence

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent to run"
        required: false
        type: choice
        default: all
        options:
          - all
          - quality
          - docs
      date_override:
        description: "Date override (YYYY-MM-DD)"
        required: false
        type: string
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: agent-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: "quality: daily gate evidence"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.agent == 'all' || github.event.inputs.agent == 'quality' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run quality agent
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          DATE="${DATE_OVERRIDE:-$(date -u +%Y-%m-%d)}"
          node scripts/agent-runner.mjs quality --period "${DATE}"

      - name: Upload quality artifact
        if: ${{ always() && github.event_name != 'push' }}
        uses: actions/upload-artifact@v7
        with:
          name: daily-quality
          path: docs/reviews/quality-gate-*.md
          if-no-files-found: warn

  docs:
    name: "docs: daily documentation evidence"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.agent == 'all' || github.event.inputs.agent == 'docs' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run docs agent
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          DATE="${DATE_OVERRIDE:-$(date -u +%Y-%m-%d)}"
          node scripts/agent-runner.mjs docs --period "${DATE}"

      - name: Upload docs artifact
        if: ${{ always() && github.event_name != 'push' }}
        uses: actions/upload-artifact@v7
        with:
          name: daily-docs
          path: docs/reviews/documentation-audit-*.md
          if-no-files-found: warn

  orchestrator-commit:
    name: "orchestrator: serialize daily artifacts"
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name != 'push' }}
    needs:
      - quality
      - docs
    steps:
      - uses: actions/checkout@v6

      - name: Download daily artifacts
        uses: actions/download-artifact@v8
        with:
          path: .
          merge-multiple: true
        continue-on-error: true

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Refresh health dashboard and retention window
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          DATE="${DATE_OVERRIDE:-$(date -u +%Y-%m-%d)}"
          node scripts/dashboard-generator.mjs --period "${DATE}"
          node scripts/report-retention.mjs --apply

      - name: Gate generated daily artifacts
        run: |
          git diff --check
          pnpm test:agent-framework
          node scripts/doc-generator.mjs links

      - name: Commit daily artifacts
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: daily agent artifacts"
          file_pattern: "docs/reviews/daily-audit-*.md docs/reviews/quality-gate-*.md docs/reviews/documentation-audit-*.md docs/planning/AGENT_HEALTH_DASHBOARD.md docs/planning/handoff-ledger.json"
          commit_user_name: "orchestrator[bot]"
          commit_user_email: "orchestrator[bot]@gis-engine.dev"
