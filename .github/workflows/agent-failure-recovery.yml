# Agent Failure Recovery — 智能体故障恢复工作流
#
# 触发条件：
#   1. 定时检查：每 6 小时自动扫描
#   2. 手动触发：workflow_dispatch
#
# 功能：
#   1. 使用 gh CLI 查询最近 agent workflow 状态
#   2. 失败时运行核心门禁验证
#   3. 创建 escalation issue

name: Agent Failure Recovery

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      target_workflow:
        description: "指定检查的工作流（留空检查全部）"
        required: false
        type: choice
        options:
          - all
          - "Agent Daily Cadence"
          - "Agent Weekly Cadence"
          - "Agent Monthly Cadence"

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  check-and-recover:
    name: "故障检测与恢复"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 检查 agent workflow 状态
        id: health
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ github.event.inputs.target_workflow || 'all' }}
        run: |
          set -euo pipefail
          FAILED=0
          {
            echo "## Agent Workflow Health"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          WORKFLOWS=("Agent Daily Cadence" "Agent Weekly Cadence" "Agent Monthly Cadence")

          for WF in "${WORKFLOWS[@]}"; do
            if [ "${TARGET}" != "all" ] && [ "${WF}" != "${TARGET}" ]; then
              continue
            fi

            echo "checking ${WF}..." >> "$GITHUB_STEP_SUMMARY"

            RUN_INFO=$(gh run list --workflow="${WF}" --limit 1 --json conclusion,status,databaseId 2>/dev/null || echo "[]")
            CONCLUSION=$(echo "${RUN_INFO}" | jq -r '.[0].conclusion // ""' 2>/dev/null || echo "")

            if [ "${CONCLUSION}" = "failure" ]; then
              FAILED=$((FAILED + 1))
              echo "- [FAIL] ${WF}" >> "$GITHUB_STEP_SUMMARY"
            elif [ "${CONCLUSION}" = "success" ]; then
              echo "- [OK] ${WF}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- [N/A] ${WF}: ${CONCLUSION:-not run}" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

          if [ "${FAILED}" -eq 0 ]; then
            echo "All agent workflows healthy" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: pnpm/action-setup@v6
        if: ${{ steps.health.outputs.failed > 0 }}
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        if: ${{ steps.health.outputs.failed > 0 }}
        with:
          node-version: "22"
          cache: "pnpm"

      - if: ${{ steps.health.outputs.failed > 0 }}
        run: pnpm install --frozen-lockfile

      - name: 安装 Playwright Chromium
        if: ${{ steps.health.outputs.failed > 0 }}
        run: pnpm exec playwright install --with-deps chromium

      - name: 运行门禁
        if: ${{ steps.health.outputs.failed > 0 }}
        run: |
          pnpm build:schema && pnpm check
          echo "✅ 核心门禁通过"

      - name: 创建 escalation issue
        if: ${{ steps.health.outputs.failed > 0 }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Agent Escalation: Workflow failure detected" \
            --body "## Agent Workflow Failure Detected

          The automated health check detected one or more agent workflow failures.

          **Actions required:**
          - @orchestrator reviews the Actions tab
          - Identify root cause and assign owner
          - Run \`pnpm build:schema && pnpm check\` locally to verify

          **Recovery steps:**
          1. Check the failed workflow logs
          2. Apply fix and push to main
          3. Monitor the next scheduled run
          4. Close this issue when resolved" \
            --label "agent-escalation,automation"
