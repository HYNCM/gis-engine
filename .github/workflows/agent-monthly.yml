# Agent Monthly Cadence — 每月智能体路线图周期
#
# 触发条件：
#   1. 定时：每月 1 日 00:00 UTC
#   2. 手动触发
#
# 执行的智能体任务：
#   - product：刷新月度路线图
#   - orchestrator：审批优先级和权衡
#   - quality：验证发布就绪证据
#   - orchestrator：创建 sprint 任务批次

name: Agent Monthly Cadence

on:
  schedule:
    - cron: "0 0 1 * *" # 每月 1 日 00:00 UTC
  workflow_dispatch:
    inputs:
      month:
        description: "指定月份（YYYY-MM）"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: agent-monthly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Job 1: 月度路线图 ──
  monthly-roadmap:
    name: "product-strategist: 月度路线图"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: 安装 Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: 运行完整测试套件收集数据
        run: |
          pnpm build:schema
          pnpm check 2>&1 | tee /tmp/full-check.log || true
          pnpm test:snapshot:smoke 2>&1 | tee /tmp/snapshot-smoke.log || true

      - name: 统计本月代码变更
        run: |
          echo "=== 本月代码变更统计 ==="
          echo "Commits in last 30 days:"
          git log --oneline --since="30 days ago" | wc -l
          echo ""
          echo "Changed files:"
          git diff --stat HEAD~30..HEAD 2>/dev/null || echo "(不足 30 天历史)"

      - name: 生成月度路线图模板
        env:
          MONTH_OVERRIDE: ${{ github.event.inputs.month }}
        run: |
          MONTH=$(date -u +%Y-%m)
          if [ -n "${MONTH_OVERRIDE}" ]; then
            MONTH="${MONTH_OVERRIDE}"
          fi

          echo "---" > docs/planning/monthly-roadmap.md
          echo "agent: product" >> docs/planning/monthly-roadmap.md
          echo "period: ${MONTH}" >> docs/planning/monthly-roadmap.md
          echo "generated_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> docs/planning/monthly-roadmap.md
          echo "repo_revision: \"${{ github.sha }}\"" >> docs/planning/monthly-roadmap.md
          echo "decision_level: info" >> docs/planning/monthly-roadmap.md
          echo "---" >> docs/planning/monthly-roadmap.md
          echo "" >> docs/planning/monthly-roadmap.md
          echo "# Monthly Roadmap: ${MONTH}" >> docs/planning/monthly-roadmap.md
          echo "" >> docs/planning/monthly-roadmap.md
          echo "> ⚠️ 本报告为 automation-generated evidence/template，不是已完成的 product-strategist 路线图；补充证据、影响、行动和置信度前不得作为 advisory/blocking 决策依据。" >> docs/planning/monthly-roadmap.md

          mkdir -p monthly-artifacts/docs/planning
          cp docs/planning/monthly-roadmap.md monthly-artifacts/docs/planning/monthly-roadmap.md

      - name: 上传路线图 artifact
        uses: actions/upload-artifact@v7
        with:
          name: monthly-roadmap
          path: monthly-artifacts/
          if-no-files-found: error

  # ── Job 2: 发布就绪验证 ──
  release-readiness:
    name: "quality-guardian: 发布就绪验证"
    runs-on: ubuntu-latest
    needs: [monthly-roadmap]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: 安装 Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: 运行发布级门禁
        run: |
          pnpm build:schema
          pnpm check
          pnpm test:snapshot:smoke
          pnpm test:release:scene3d

      - name: 生成发布就绪报告
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p docs/reviews
          echo "---" > docs/reviews/release-readiness-${DATE}.md
          echo "agent: quality" >> docs/reviews/release-readiness-${DATE}.md
          echo "period: $(date -u +%Y-%m)" >> docs/reviews/release-readiness-${DATE}.md
          echo "generated_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> docs/reviews/release-readiness-${DATE}.md
          echo "repo_revision: \"${{ github.sha }}\"" >> docs/reviews/release-readiness-${DATE}.md
          echo "decision_level: info" >> docs/reviews/release-readiness-${DATE}.md
          echo "---" >> docs/reviews/release-readiness-${DATE}.md
          echo "" >> docs/reviews/release-readiness-${DATE}.md
          echo "# Release Readiness: ${DATE}" >> docs/reviews/release-readiness-${DATE}.md
          echo "" >> docs/reviews/release-readiness-${DATE}.md
          echo "> ⚠️ 本报告为 automation-generated machine evidence/template，不是已完成的 quality-guardian release gate；补充完整门禁判定前不得作为 blocking release 决策依据。" >> docs/reviews/release-readiness-${DATE}.md

          mkdir -p monthly-artifacts/docs/reviews
          cp docs/reviews/release-readiness-${DATE}.md monthly-artifacts/docs/reviews/release-readiness-${DATE}.md

      - name: 上传发布就绪 artifact
        uses: actions/upload-artifact@v7
        with:
          name: monthly-release-readiness
          path: monthly-artifacts/
          if-no-files-found: error

  # ── Job 3: 单写入者序列化提交 ──
  coordinator-commit:
    name: "coordinator: 序列化提交 monthly artifacts"
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - monthly-roadmap
      - release-readiness
    steps:
      - uses: actions/checkout@v6

      - name: 下载 monthly artifacts
        uses: actions/download-artifact@v8
        with:
          path: .
          merge-multiple: true

      - name: 提交 monthly artifacts
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: monthly agent artifacts"
          file_pattern: "docs/planning/monthly-roadmap.md docs/reviews/release-readiness-*.md"
          commit_user_name: "coordinator[bot]"
          commit_user_email: "coordinator[bot]@gis-engine.dev"
