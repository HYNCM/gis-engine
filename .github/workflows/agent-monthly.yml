# Agent Monthly Cadence — roadmap and release-readiness evidence

name: Agent Monthly Cadence

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      month:
        description: "Month override (YYYY-MM)"
        required: false
        type: string

permissions:
  contents: write
  issues: read

concurrency:
  group: agent-monthly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  product-roadmap:
    name: "product: monthly roadmap"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run product monthly template
        env:
          MONTH_OVERRIDE: ${{ github.event.inputs.month }}
        run: |
          MONTH="${MONTH_OVERRIDE:-$(date -u +%Y-%m)}"
          node scripts/agent-runner.mjs product --period "${MONTH}"

      - uses: actions/upload-artifact@v7
        with:
          name: monthly-roadmap
          path: docs/planning/monthly-roadmap.md
          if-no-files-found: warn

  release-quality:
    name: "quality: release readiness evidence"
    runs-on: ubuntu-latest
    needs: [product-roadmap]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run quality release template
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          node scripts/agent-runner.mjs quality --period "release-${DATE}"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: monthly-release-quality
          path: docs/reviews/quality-gate-release-*.md
          if-no-files-found: warn

  orchestrator-commit:
    name: "orchestrator: serialize monthly artifacts"
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - product-roadmap
      - release-quality
    steps:
      - uses: actions/checkout@v6

      - name: Download monthly artifacts
        uses: actions/download-artifact@v8
        with:
          path: .
          merge-multiple: true
        continue-on-error: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Refresh issue snapshot and dashboard
        run: |
          node scripts/issues-snapshot.mjs
          node scripts/dashboard-generator.mjs --period "$(date -u +%Y-%m-%d)"

      - name: Commit monthly artifacts
        run: |
          set -euo pipefail
          git config user.name "orchestrator[bot]"
          git config user.email "orchestrator[bot]@gis-engine.dev"

          git add \
            docs/planning/monthly-roadmap.md \
            docs/planning/issues-snapshot.md \
            docs/planning/AGENT_HEALTH_DASHBOARD.md \
            docs/planning/handoff-ledger.json

          shopt -s nullglob
          release_reports=(docs/reviews/quality-gate-release-*.md)
          if [ "${#release_reports[@]}" -gt 0 ]; then
            git add "${release_reports[@]}"
          fi

          if git diff --cached --quiet; then
            echo "No monthly artifacts changed."
            exit 0
          fi

          git commit -m "docs: monthly agent artifacts"
          git push
