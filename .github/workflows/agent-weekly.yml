# Agent Weekly Cadence — product/orchestrator/evolution cycle

name: Agent Weekly Cadence

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      week:
        description: "Week override (YYYY-Www, for example 2026-W23)"
        required: false
        type: string

permissions:
  contents: write
  issues: read

concurrency:
  group: agent-weekly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  product:
    name: "product: weekly evidence"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run product agent template
        env:
          WEEK_OVERRIDE: ${{ github.event.inputs.week }}
        run: |
          WEEK="${WEEK_OVERRIDE:-$(date -u +%G-W%V)}"
          node scripts/agent-runner.mjs product --period "${WEEK}"

      - uses: actions/upload-artifact@v7
        with:
          name: weekly-product
          path: docs/research/competitor-updates-*.md
          if-no-files-found: warn

  orchestrator:
    name: "orchestrator: weekly planning snapshot"
    runs-on: ubuntu-latest
    needs: [product]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download product artifact
        uses: actions/download-artifact@v8
        with:
          name: weekly-product
          path: .
        continue-on-error: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run orchestrator agent template
        env:
          WEEK_OVERRIDE: ${{ github.event.inputs.week }}
        run: |
          WEEK="${WEEK_OVERRIDE:-$(date -u +%G-W%V)}"
          node scripts/agent-runner.mjs orchestrator --period "${WEEK}"
          node scripts/issues-snapshot.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: weekly-orchestrator
          path: |
            docs/planning/weekly-digest.md
            docs/planning/issues-snapshot.md
          if-no-files-found: warn

  evolution:
    name: "orchestrator: evolution metrics"
    runs-on: ubuntu-latest
    needs: [orchestrator]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run evolution collectors
        env:
          WEEK_OVERRIDE: ${{ github.event.inputs.week }}
        run: |
          WEEK="${WEEK_OVERRIDE:-$(date -u +%G-W%V)}"
          node scripts/evolution-collector.mjs --week "${WEEK}" || STATUS=$?
          node scripts/evolution-pattern-extractor.mjs --month "$(date -u +%Y-%m)"
          exit "${STATUS:-0}"

      - uses: actions/upload-artifact@v7
        with:
          name: weekly-evolution
          path: |
            docs/planning/evolution-ledger.md
            docs/planning/evolution-snapshot-*.md
            docs/planning/evolution-patterns.md
            docs/planning/evolution-pitfalls.md
          if-no-files-found: warn

  perf-trend:
    name: "builder: perf trend evidence"
    runs-on: ubuntu-latest
    needs: [evolution]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run perf trend reporter
        env:
          WEEK_OVERRIDE: ${{ github.event.inputs.week }}
        run: |
          WEEK="${WEEK_OVERRIDE:-$(date -u +%G-W%V)}"
          pnpm --dir packages/engine exec tsx ../../scripts/perf-trend.mjs --period "${WEEK}" --output "docs/reviews/perf-trend-${WEEK}.md"

      - uses: actions/upload-artifact@v7
        with:
          name: weekly-perf-trend
          path: docs/reviews/perf-trend-*.md
          if-no-files-found: warn

  orchestrator-commit:
    name: "orchestrator: serialize weekly artifacts"
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - product
      - orchestrator
      - evolution
      - perf-trend
    steps:
      - uses: actions/checkout@v6

      - name: Download weekly artifacts
        uses: actions/download-artifact@v8
        with:
          path: .
          merge-multiple: true
        continue-on-error: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Refresh issue snapshot, handoff ledger, and dashboard
        run: |
          PERIOD="$(date -u +%Y-%m-%d)"
          node scripts/issues-snapshot.mjs
          node scripts/dashboard-generator.mjs --period "${PERIOD}"

      - name: Commit weekly artifacts
        env:
          COMMIT_MESSAGE: "docs: weekly agent artifacts for ${{ github.event.inputs.week || 'current week' }}"
        run: |
          git config user.name "orchestrator[bot]"
          git config user.email "orchestrator[bot]@gis-engine.dev"

          shopt -s nullglob
          files=(
            docs/research/competitor-updates-*.md
            docs/planning/weekly-digest.md
            docs/planning/issues-snapshot.md
            docs/planning/evolution-ledger.md
            docs/planning/evolution-snapshot-*.md
            docs/planning/evolution-patterns.md
            docs/planning/evolution-pitfalls.md
            docs/planning/AGENT_HEALTH_DASHBOARD.md
            docs/planning/handoff-ledger.json
            docs/reviews/perf-trend-*.md
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No weekly artifacts matched."
            exit 0
          fi

          git add -- "${files[@]}"
          if git diff --cached --quiet; then
            echo "No weekly artifact changes to commit."
            exit 0
          fi

          git commit -m "${COMMIT_MESSAGE}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
