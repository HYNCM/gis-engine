# Docs Site Deploy — 部署 VitePress 文档站到 GitHub Pages
#
# 触发：push main 时 docs/website/ 变更

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/website/**"
      - "packages/*/src/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: "构建文档站"
    runs-on: ubuntu-latest
    outputs:
      pages_available: ${{ steps.pages.outputs.available }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: 构建 SDK
        run: pnpm build

      - name: 构建文档站
        run: cd docs/website && pnpm docs:build

      - name: 检查 GitHub Pages 可用性
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/pages" >/tmp/pages.json 2>/tmp/pages-error.txt
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow >/tmp/pages-create.json 2>/tmp/pages-create-error.txt
          create_status=$?
          set -e

          if [ "$create_status" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=false" >> "$GITHUB_OUTPUT"
          {
            echo "### GitHub Pages deployment skipped"
            echo
            echo "Docs build completed, but this repository cannot currently use GitHub Pages workflow deployment."
            echo
            echo '```txt'
            cat /tmp/pages-error.txt
            cat /tmp/pages-create-error.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Pages
        if: steps.pages.outputs.available == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: steps.pages.outputs.available == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/website/.vitepress/dist

  deploy:
    name: "部署到 GitHub Pages"
    if: needs.build.outputs.pages_available == 'true'
    environment:
      name: "github-pages"
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
