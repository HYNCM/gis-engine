# Docs Site Deploy — 部署 VitePress 文档站到 GitHub Pages
#
# 触发：push main 时 docs/website/ 变更

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/website/**"
      - "packages/*/src/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: "构建文档站"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: 构建 SDK
        run: pnpm build

      - name: 构建文档站
        run: cd docs/website && pnpm docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/website/.vitepress/dist

  deploy:
    name: "部署到 GitHub Pages"
    environment:
      name: "github-pages"
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
