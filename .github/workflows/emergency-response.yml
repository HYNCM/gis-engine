# Emergency Response Workflow — 紧急响应流水线
#
# 触发条件：手动触发，当检测到 P0 阻断问题时
#
# 流程：
#   1. orchestrator 写入 docs/alerts/critical-gaps.md
#   2. orchestrator 创建 P0/P1 修复任务
#   3. quality 执行紧急门禁
#   4. 修复完成后关闭紧急模式

name: Emergency Response

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "紧急原因（如 security issue / release blocker）"
        required: true
        type: string
      affected:
        description: "影响的用户/系统"
        required: true
        type: string
      owner:
        description: "负责修复的 owner"
        required: true
        type: string
      rollback_plan:
        description: "回滚方案"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: emergency-response-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 写入紧急告警 ──
  create-alert:
    name: "创建紧急告警文件"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 生成紧急告警
        env:
          ALERT_REASON: ${{ github.event.inputs.reason }}
          ALERT_AFFECTED: ${{ github.event.inputs.affected }}
          ALERT_OWNER: ${{ github.event.inputs.owner }}
          ALERT_ROLLBACK_PLAN: ${{ github.event.inputs.rollback_plan }}
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p docs/alerts

          {
            cat << ALERTEOF
---
agent: orchestrator
period: emergency
generated_at: ${DATE}
repo_revision: "${GITHUB_SHA}"
inputs:
  - manual_trigger
decision_level: emergency
---

# Critical Gap Alert

- **触发时间**: ${DATE}
- **原因**:
ALERTEOF
            printf '%s\n' "${ALERT_REASON}" | sed 's/^/  /'
            cat << ALERTEOF
- **影响**:
ALERTEOF
            printf '%s\n' "${ALERT_AFFECTED}" | sed 's/^/  /'
            cat << ALERTEOF
- **Owner**:
ALERTEOF
            printf '%s\n' "${ALERT_OWNER}" | sed 's/^/  /'
            cat << ALERTEOF
- **回滚方案**:
ALERTEOF
            printf '%s\n' "${ALERT_ROLLBACK_PLAN}" | sed 's/^/  /'
            cat << ALERTEOF
- **有效期**: 48 小时内

## 紧急门禁要求

1. Schema 验证（如触及公共输入）
2. 确定性测试（触及区域相关）
3. 资源策略检查（如涉及 URL/tile/worker 变更）
4. Smoke snapshot（如可能影响渲染）

## 后续任务

<!-- orchestrator 在此追加 P0/P1 follow-up tasks -->

## 关闭条件

<!-- 修复完成后由 orchestrator 填写 -->
ALERTEOF
          } > docs/alerts/critical-gaps.md

          mkdir -p emergency-artifacts/docs/alerts
          cp docs/alerts/critical-gaps.md emergency-artifacts/docs/alerts/critical-gaps.md

      - name: 上传紧急告警 artifact
        uses: actions/upload-artifact@v7
        with:
          name: emergency-alert
          path: emergency-artifacts/
          if-no-files-found: error

  # ── 紧急门禁 ──
  emergency-gate:
    name: "执行紧急门禁"
    runs-on: ubuntu-latest
    needs: [create-alert]
    steps:
      - uses: actions/checkout@v6

      - name: 下载紧急告警 artifact
        uses: actions/download-artifact@v8
        with:
          name: emergency-alert
          path: .

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: 安装 Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: 最小门禁检查
        env:
          ALERT_REASON: ${{ github.event.inputs.reason }}
        run: |
          echo "=== Emergency Gate: $(date -u) ==="
          echo "Reason: ${ALERT_REASON}"
          echo ""

          # 1. Schema validation
          echo "--- Schema Build ---"
          pnpm build:schema

          # 2. Type check
          echo "--- Type Check ---"
          pnpm check

          # 3. Smoke snapshot (fast path)
          echo "--- Smoke Snapshot ---"
          pnpm test:snapshot:smoke

          # 4. Resource policy
          echo "--- Resource Policy ---"
          pnpm test:resources

      - name: 生成紧急门禁报告
        if: always()
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "## Emergency Gate Report: ${DATE}" >> docs/alerts/critical-gaps.md
          echo "" >> docs/alerts/critical-gaps.md
          echo "| Gate | Status |" >> docs/alerts/critical-gaps.md
          echo "| --- | --- |" >> docs/alerts/critical-gaps.md
          echo "| schema build | ${{ job.status }} |" >> docs/alerts/critical-gaps.md

          mkdir -p emergency-artifacts/docs/alerts
          cp docs/alerts/critical-gaps.md emergency-artifacts/docs/alerts/critical-gaps.md

      - name: 上传紧急门禁 artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emergency-gate
          path: emergency-artifacts/
          if-no-files-found: error

  # ── 单写入者序列化提交 ──
  orchestrator-commit:
    name: "orchestrator: 序列化提交 emergency artifacts"
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - create-alert
      - emergency-gate
    steps:
      - uses: actions/checkout@v6

      - name: 下载紧急门禁 artifact
        uses: actions/download-artifact@v8
        with:
          name: emergency-gate
          path: .
        continue-on-error: true

      - name: 下载紧急告警 artifact
        uses: actions/download-artifact@v8
        with:
          name: emergency-alert
          path: .
        continue-on-error: true

      - name: 提交 emergency artifacts
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: emergency response artifacts"
          file_pattern: "docs/alerts/critical-gaps.md"
          commit_user_name: "orchestrator[bot]"
          commit_user_email: "orchestrator[bot]@gis-engine.dev"
