# NPM Publish — 发布 SDK 到 npm registry
#
# 触发：
#   - 手动触发（workflow_dispatch）
#   - Release tag push (v*)
#
# 发布策略：
#   - 委托给 scripts/publish-ga-packages.mjs，避免 legacy workflow 绕过 GA 发布 guardrail
#   - engine、ai、cli 使用 latest；scene3d 使用 next；scene3d-three-adapter 不进 GA publish workflow

name: NPM Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: "验证门禁"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm release:verify

  publish:
    name: "发布到 npm"
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish GA packages to npm
        run: pnpm release:publish
        env:
          GIS_ENGINE_ALL: ${{ secrets.GIS_ENGINE_ALL }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GIS_ENGINE_ALL || secrets.NPM_TOKEN }}
