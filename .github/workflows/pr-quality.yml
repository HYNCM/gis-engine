# PR Quality Check — event-driven HOC-N3 machine evidence

name: PR Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  schema-diff:
    name: "schema: diff report"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run schema diff
        id: schema-diff
        run: |
          set +e
          node scripts/schema-diff.mjs \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.sha }}" \
            --output .schema-diff-report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Publish schema diff summary
        if: always()
        run: |
          {
            echo "## Schema Change Report"
            echo ""
            if [ -f .schema-diff-report.md ]; then
              cat .schema-diff-report.md
            else
              echo "_No schema diff report generated._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with schema diff
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f .schema-diff-report.md ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file .schema-diff-report.md
          fi
        continue-on-error: true

      - name: Label breaking changes
        if: steps.schema-diff.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --add-label "⚠️ breaking-change"
        continue-on-error: true

  quality:
    name: "quality: PR gate plan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate and run path-aware gate plan
        run: |
          node scripts/gate-plan.mjs \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.sha }}" \
            --summary .agent-quality-summary.md \
            --run

      - name: Publish PR quality summary
        if: always()
        run: |
          {
            echo "## HOC-N3 PR Quality Evidence"
            echo ""
            cat .agent-quality-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PR quality artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-quality-gate-plan
          path: .agent-quality-summary.md
          if-no-files-found: warn

      - name: Comment PR with quality summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file .agent-quality-summary.md
        continue-on-error: true
