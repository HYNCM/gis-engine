<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Engine - AI Generation Demo</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #app {
        display: flex;
        width: 100%;
        height: 100%;
      }

      #map {
        flex: 1;
        height: 100%;
      }

      #pipeline-panel {
        width: 380px;
        height: 100%;
        overflow-y: auto;
        background: #0f172a;
        color: #e2e8f0;
        padding: 16px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 12px;
        line-height: 1.6;
      }

      #pipeline-panel h2 {
        margin: 0 0 12px;
        font-size: 14px;
        color: #7dd3fc;
      }

      .pipeline-step {
        margin-bottom: 16px;
        padding: 10px;
        border-radius: 6px;
        background: #1e293b;
        border-left: 3px solid #3b82f6;
      }

      .pipeline-step h3 {
        margin: 0 0 6px;
        font-size: 12px;
        color: #fbbf24;
      }

      .pipeline-step pre {
        margin: 4px 0;
        padding: 6px;
        background: #0f172a;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .pipeline-success {
        border-left-color: #22c55e;
      }

      .pipeline-info {
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="pipeline-panel">
        <h2>AI Generation Pipeline</h2>
        <div id="pipeline-output">Processing…</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
