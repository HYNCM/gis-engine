<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Engine - Diagnostic Error Fix</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #app {
        display: flex;
        width: 100%;
        height: 100%;
      }

      #map {
        flex: 1;
        height: 100%;
      }

      #diag-panel {
        width: 420px;
        height: 100%;
        overflow-y: auto;
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 16px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 12px;
        line-height: 1.6;
      }

      #diag-panel h2 {
        margin: 0 0 12px;
        font-size: 14px;
        color: #89b4fa;
      }

      .diag-step {
        margin-bottom: 20px;
        padding: 12px;
        border-radius: 6px;
        background: #313244;
      }

      .diag-step h3 {
        margin: 0 0 8px;
        font-size: 13px;
        color: #f9e2af;
      }

      .diag-error {
        color: #f38ba8;
      }

      .diag-warning {
        color: #fab387;
      }

      .diag-info {
        color: #89dceb;
      }

      .diag-fix {
        color: #a6e3a1;
        margin-top: 4px;
        padding: 6px;
        background: #1e1e2e;
        border-radius: 4px;
        white-space: pre-wrap;
      }

      .diag-code {
        color: #cba6f7;
        font-weight: bold;
      }

      .diag-path {
        color: #74c7ec;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="diag-panel">
        <h2>Diagnostic Panel</h2>
        <div id="diag-output">Running validation…</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
