<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Engine - Style Expressions</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      #legend {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 12px;
        line-height: 1.8;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        max-width: 260px;
      }

      #legend h3 {
        margin: 0 0 6px;
        font-size: 13px;
      }

      .legend-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="legend">
      <h3>Expression Catalog</h3>
      <div class="legend-row"><span class="legend-swatch" style="background:#ef4444"></span> match: category → color</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#3b82f6"></span> interpolate: value → radius</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#f59e0b"></span> case: conditional opacity</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#22c55e"></span> step: zoom thresholds</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#8b5cf6"></span> get/has: property access</div>
      <div class="legend-row"><span class="legend-swatch" style="background:#06b6d4"></span> math: arithmetic expressions</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
